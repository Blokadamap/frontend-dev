name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      
      - run: yarn install --frozen-lockfile
    
      - name: Check formatting
        run: yarn format:check

      - name: Type check
        run: yarn tsc --noEmit

      - name: Eslint
        run: yarn ling
  
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      
      - run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

  build:
    name: Build
    runs-on: ubuntu-latest

    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      
      - run: yarn install --frozen-lockfile

      - name: Build app
        run: yarn build
      
